<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title>Mi portfolio</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <header>
            <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top py-0">
                <div><i class="fa-solid fa-terminal ms-2"></i></div><a class="navbar-brand mx-3 my-0 py-0 fa-fade" href="#">Matías Cristovao</a>
                <button class="navbar-toggler me-2" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <svg fill="var(--button-color)" class="hamburger" viewBox="0 0 100 100" width="30">
                        <rect class="line top" 
                            width="80" height="10"
                            x='10'
                            y="25"
                            rx="5">
                        </rect>
        
                        <rect class="line middle" 
                            width="80" height="10"
                            x='10'
                            y="45"
                            rx="5">
                        </rect>
        
                        <rect class="line bottom" 
                            width="80" height="10"
                            x='10'
                            y="65"
                            rx="5">
                        </rect>
                    </svg>
                </button> 
              
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item active">
                            <a class="nav-link" href="#">About me</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Skills</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link dropdown-toggle" href="#media-menu" role="button" data-toggle="collapse" aria-expanded="false" aria-controls="media-menu" data-bs-toggle="true">
                              Find me
                            </a>
                            <div class="collapse container" id="media-menu">
                                <div class="card-icon mt-md-3 mx-1">
                                    <a href="https://www.linkedin.com/in/mat%C3%ADas-cristovao-5b2265216/" target="_blank" rel="noreferrer noopener">
                                        <i class="fab fa-linkedin"></i>
                                    </a>
                                </div>
                                <div class="card-icon mt-md-3 mx-1">
                                    <a href="https://twitter.com/home" target="_blank" rel="noreferrer noopener">
                                        <i class="fab fa-github"></i>
                                    </a> 
                                </div>
                                <div class="card-icon mt-md-2 mb-md-1 mx-1">
                                    <a href="https://twitter.com/home" target="_blank" rel="noreferrer noopener">
                                        <i class="fab fa-twitter"></i>
                                    </a> 
                                </div>
                            </div>
                        </li>
                    </ul>
                    <button class="btn btn-outline-success my-2 my-sm-3 mx-2 px-4 py-1" id="login-btn">Log in</button>
                </div>
            </nav>
        </header>
        
        <main role="main">
            <div id="carousel" class="carousel slide carousel-fade" data-ride="carousel" data-pause="false" data-interval="8000">
                <ol class="carousel-indicators">
                    <li data-target="#carousel" data-slide-to="0" class="active indicator"></li>
                    <li data-target="#carousel" data-slide-to="1" class="indicator"></li>
                    <li data-target="#carousel" data-slide-to="2" class="indicator"></li>
                </ol>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img class="d-block w-100 carousel-img" src="https://elceo.com/wp-content/uploads/2021/10/mexico-economia-av.jpg" alt="First slide">
                        <div class="d-none d-md-block carousel-caption py-0 my-0 container-fluid">
                            <div class="row">
                                <div class="col align-self-start text-left">
                                    <h5 class="photo-title">My studies</h5>
                                    <button class="btn btn-outline-danger photo-btn">Go and see</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100 carousel-img" src="https://www.fundacionaquae.org/wp-content/uploads/2020/04/Nuevas-formas-de-trabajo3-1-002.jpg" alt="Second slide">
                        <div class="d-none d-md-block carousel-caption py-0 my-0 container-fluid">
                            <div class="row">
                                <div class="col align-self-center">
                                    <h5 class="photo-title">My experience</h5>
                                    <button class="btn btn-outline-primary photo-btn">Go and see</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100 carousel-img" src="https://a.storyblok.com/f/112937/568x400/19b8611e4b/10-most-fun-languages-to-learn_square-568x400.jpg/m/620x0/filters:quality(70)/" alt="Third slide">
                            <div class="d-none d-md-block carousel-caption py-0 my-0 container-fluid">
                            <div class="row">
                                <div class="col align-self-end text-right">
                                    <h5 class="photo-title">My languages</h5>
                                    <button class="btn btn-outline-success photo-btn">Go and see</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <a class="carousel-control-prev carousel-ctrl" href="#carousel" role="button" data-slide="prev">
                    <span class="fa-solid fa-circle-arrow-left carousel-ctrl-icon"></span>
                    <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next carousel-ctrl" href="#carousel" role="button" data-slide="next">
                    <span class="fa-solid fa-circle-arrow-right carousel-ctrl-icon" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                </a>
            </div>
        </main>
        
    </body>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://kit.fontawesome.com/68a8d87821.js" crossorigin="anonymous"></script>
    <script src="portfolio.js"></script>
</html>
